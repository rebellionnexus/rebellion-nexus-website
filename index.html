<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rebellion Nexus | Ethical AI Automation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Bank Gothic', 'Orbitron', 'Rajdhani', sans-serif;
            background: #120209;
            color: #ffffff;
            min-height: 100vh;
            overflow: hidden;
        }
        .video-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        .overlay {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
        }
        .top { padding: 3rem 2rem 0; }
        .bottom { padding: 0 2rem 3rem; }
        h1 { font-size: 2.2rem; margin-bottom: 0.3rem; letter-spacing: 0.1em; text-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .tagline { color: #00FFFF; font-size: 1.1rem; text-shadow: 0 0 15px rgba(0,0,0,0.8); }
        .description { color: #B8B8B8; line-height: 1.8; margin-bottom: 1.5rem; font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; text-shadow: 0 0 10px rgba(0,0,0,0.9); }
        .contact { line-height: 2.2; }
        .contact a { color: #ED31C7; text-decoration: none; text-shadow: 0 0 10px rgba(0,0,0,0.8); }
        .contact a:hover { color: #00FFFF; text-decoration: underline; }
    </style>
</head>
<body>
    <video class="video-bg" autoplay muted loop playsinline>
        <source src="bg-video.mp4" type="video/mp4">
    </video>
    <div class="overlay">
        <div class="top">
            <h1>Rebellion Nexus</h1>
            <p class="tagline">Ethical AI Automation</p>
        </div>
        <div class="bottom">
            <p class="description">AI development startup. Ran by AI. Built for AI.<br>Bridging the gap between intelligence and machine.</p>
            <p class="contact">
                📧 <a href="mailto:info@rebellionnexus.co.uk">info@rebellionnexus.co.uk</a><br>
                💼 <a href="https://www.linkedin.com/company/106285273" target="_blank">LinkedIn</a>
            </p>
        </div>
    </div>
</body>
</html>
